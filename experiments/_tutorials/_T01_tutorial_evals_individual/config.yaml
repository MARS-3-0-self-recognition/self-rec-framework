# ============================================================================
# MODELS  — evaluators (model_names) and the generators they judge.
# ============================================================================
model_names: ['-set', 'tutorial']
generator_models: ['-set', 'tutorial']

# ============================================================================
# EXPERIMENT DEFINITION  — operationalization (drives the experiment name and
# the eval task that is built).
# ============================================================================
tags: "UT"
format: "IND-Q"
task: "Rec"
priming: False
generator_output: "FA"
evaluator_reasoning: "DR"

# ============================================================================
# SWEEP  — generation/eval run parameters (read by the a00_sweep scripts).
# ============================================================================
temperature: 0.3
# Must match the T00 data-gen temperature: generator data is saved under
# {model}_temp_0.0, and the eval uses this to locate it (temp_suffix).
generator_temperature: 0.0
max_final_answer_tokens: max
overwrite: true                  # tutorials regenerate by default
treatment_type: "other_models"   # other_models | caps | typos
max_tasks: 20
batch: false                     # false | true | <int batch size>
skip_confirmation: true

# ============================================================================
# ANALYSIS  — inputs and outputs of the b00_analysis scripts.
# figures_to_produce names the figure files (no extension) the analysis should
# emit; anything not listed is skipped. Leave empty/omit to produce all.
# ============================================================================
datasets: ["wikisum", "bigcodebench", "pku_saferlhf", "sharegpt"]
dataset_subsets: ["tutorial_set"]
figures_to_produce: ["aggregated_performance_grouped"]
